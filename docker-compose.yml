services:
  db:
    image: mysql:8.0
    container_name: jsp-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: jsp-api
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV}
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      MASTER_SECRET: ${MASTER_SECRET}
      # ANTHROPIC_API_KEY is optional — if you've done `claude login` on the host,
      # the bind-mount below uses that session instead. Only set this if you prefer
      # pay-per-token API access.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_DEFAULT_MODEL: ${ANTHROPIC_DEFAULT_MODEL:-claude-sonnet-4-6}
      CLAUDE_CODE_BIN: ${CLAUDE_CODE_BIN:-claude}
      SKILLS_DIR: ${SKILLS_DIR:-/app/skills}
      EXTRA_CORS_ORIGINS: ${EXTRA_CORS_ORIGINS:-}
      ALLOW_ALL_ORIGINS: ${ALLOW_ALL_ORIGINS:-false}
    depends_on:
      db:
        condition: service_healthy
    ports:
      # Bound to loopback by default — Caddy reaches it through the
      # internal docker network at api:8000, no host exposure needed.
      # Override with PUBLIC_API_BIND=0.0.0.0 in .env for direct LAN
      # access without TLS (dev only).
      - "${PUBLIC_API_BIND:-127.0.0.1}:${API_PORT}:8000"
    volumes:
      - ./skills:/app/skills:ro
      # Isolated named volume for the container's own Claude Code config.
      # NOT bound to the host — nothing leaks in (your personal skills /
      # sessions) or out. Run `docker compose exec -it api claude login` once
      # after the stack is up to complete the standard OAuth flow and persist
      # credentials into this volume.
      - claude_config:/root/.claude
      - uploads:/app/uploads

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_API_PORT: ${NEXT_PUBLIC_API_PORT}
    container_name: jsp-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_API_PORT: ${NEXT_PUBLIC_API_PORT}
      # Used by next.config.mjs rewrites to proxy /api/* and /health/* to the
      # api container over the internal Docker network. The api container
      # always listens on 8000 inside the network regardless of API_PORT (which
      # only controls the host-side port mapping).
      INTERNAL_API_URL: http://api:8000
    depends_on:
      - api
    ports:
      # Bound to loopback by default so the LAN can't reach the web
      # container over plain HTTP — Caddy serves it via HTTPS on
      # port 443. Set PUBLIC_WEB_BIND=0.0.0.0 in .env if you want
      # direct LAN access without TLS (dev only).
      - "${PUBLIC_WEB_BIND:-127.0.0.1}:${WEB_PORT}:3000"

  # HTTPS reverse proxy. The web app on the LAN is only reachable
  # through here on HTTPS_WEB_PORT (default 443). Caddy terminates
  # TLS using a self-signed cert generated at container startup by
  # apps/caddy/entrypoint.sh — no on-demand pipeline, no external
  # cert authority dependency.
  caddy:
    build:
      context: ./apps/caddy
      dockerfile: Dockerfile
    container_name: jsp-caddy
    restart: unless-stopped
    environment:
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@local}
      # Hostname baked into the cert's CN + first SAN.
      CADDY_HOSTNAME: ${CADDY_HOSTNAME:-jobsearchpal.local}
      # Comma-separated extra SANs in OpenSSL's `DNS:foo,IP:1.2.3.4`
      # shape. Set this to your server's public IP / hostname for a
      # clean lock icon.
      CADDY_EXTRA_SANS: ${CADDY_EXTRA_SANS:-}
    ports:
      - "${HTTPS_WEB_PORT:-443}:443"
    volumes:
      - ./apps/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - web

volumes:
  db_data:
  uploads:
  claude_config:
  caddy_data:
  caddy_config:
