services:
  db:
    image: mysql:8.0
    container_name: jsp-db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: jsp-api
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV}
      MYSQL_HOST: ${MYSQL_HOST}
      MYSQL_PORT: ${MYSQL_PORT}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      SESSION_SECRET: ${SESSION_SECRET}
      MASTER_SECRET: ${MASTER_SECRET}
      # ANTHROPIC_API_KEY is optional — if you've done `claude login` on the host,
      # the bind-mount below uses that session instead. Only set this if you prefer
      # pay-per-token API access.
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_DEFAULT_MODEL: ${ANTHROPIC_DEFAULT_MODEL:-claude-sonnet-4-6}
      CLAUDE_CODE_BIN: ${CLAUDE_CODE_BIN:-claude}
      SKILLS_DIR: ${SKILLS_DIR:-/app/skills}
      EXTRA_CORS_ORIGINS: ${EXTRA_CORS_ORIGINS:-}
      ALLOW_ALL_ORIGINS: ${ALLOW_ALL_ORIGINS:-false}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT}:8000"
    volumes:
      - ./skills:/app/skills:ro
      # Isolated named volume for the container's own Claude Code config.
      # NOT bound to the host — nothing leaks in (your personal skills /
      # sessions) or out. Run `docker compose exec -it api claude login` once
      # after the stack is up to complete the standard OAuth flow and persist
      # credentials into this volume.
      - claude_config:/root/.claude
      - uploads:/app/uploads

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_API_PORT: ${NEXT_PUBLIC_API_PORT}
    container_name: jsp-web
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
      NEXT_PUBLIC_API_PORT: ${NEXT_PUBLIC_API_PORT}
      # Used by next.config.mjs rewrites to proxy /api/* and /health/* to the
      # api container over the internal Docker network. The api container
      # always listens on 8000 inside the network regardless of API_PORT (which
      # only controls the host-side port mapping).
      INTERNAL_API_URL: http://api:8000
    depends_on:
      - api
    ports:
      - "${WEB_PORT}:3000"

  # R10 — streamed Chromium for Companion-driven application assistance.
  # Both the user (via /browser → noVNC stream) and the Companion (via
  # CDP / Playwright on port 9222) drive the same browser session.
  # Persistent profile in `chromium_profile` volume keeps logins (LinkedIn,
  # Greenhouse SSO, etc.) across restarts. Not exposed to the host
  # network — both control planes are reverse-proxied through the api
  # container's cookie auth so only the logged-in user can connect.
  chromium:
    image: lscr.io/linuxserver/chromium:latest
    container_name: jsp-chromium
    restart: unless-stopped
    shm_size: "1gb"
    environment:
      PUID: "1000"
      PGID: "1000"
      TZ: "${TZ:-America/New_York}"
      # CHROMIUM_VNC_PASSWORD gates the underlying VNC stream. The api
      # proxy adds its own cookie-auth layer on top, so this is
      # defense-in-depth rather than the only auth.
      PASSWORD: "${CHROMIUM_VNC_PASSWORD:-jobsearchpal}"
      CHROME_CLI: "--remote-debugging-port=9222 --remote-debugging-address=0.0.0.0"
    volumes:
      - chromium_profile:/config
    # KasmVNC's web app is served on 3000 inside the container.
    # We expose it on the host so the /browser page can iframe it
    # directly — much simpler than reverse-proxying every static
    # asset + WebSocket through api. KasmVNC's built-in PASSWORD
    # env var gates initial connection. CDP (port 9222) stays
    # internal-only since only the api container drives it.
    ports:
      - "${CHROMIUM_PORT:-6901}:3000"

  # Tiny sidecar that exposes chromium's CDP over the docker network.
  # The linuxserver/chromium wrapper strips --remote-debugging-address
  # so Chromium binds CDP to 127.0.0.1 only, which our api container
  # can't reach. socat shares chromium's network namespace via
  # network_mode: service:chromium and forwards 0.0.0.0:9223 → the
  # localhost CDP port. The api container connects to `chromium:9223`.
  chromium-cdp-proxy:
    image: alpine/socat:latest
    container_name: jsp-chromium-cdp-proxy
    restart: unless-stopped
    network_mode: "service:chromium"
    depends_on:
      - chromium
    command: ["TCP-LISTEN:9223,fork,reuseaddr", "TCP:127.0.0.1:9222"]

volumes:
  db_data:
  uploads:
  claude_config:
  chromium_profile:
