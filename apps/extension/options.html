<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Job Search Pal — Settings</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        background: #16140e;
        color: #e7e2cf;
        margin: 0;
        padding: 24px;
        max-width: 480px;
      }
      h1 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.08em; color: #c0b896; }
      label { display: block; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; color: #918a72; margin: 12px 0 4px; }
      input {
        width: 100%;
        background: #1f1c14;
        color: #e7e2cf;
        border: 1px solid #3a3325;
        border-radius: 3px;
        padding: 6px 8px;
        font-size: 12px;
        box-sizing: border-box;
      }
      button {
        background: #c89b3c;
        color: #1b1b1b;
        border: 0;
        border-radius: 3px;
        padding: 6px 14px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        margin-top: 12px;
      }
      p { font-size: 12px; color: #918a72; line-height: 1.5; }
      #status { font-size: 11px; color: #6ec078; margin-top: 8px; min-height: 1em; }
    </style>
  </head>
  <body>
    <h1>Job Search Pal — Settings</h1>
    <p>
      The clipper saves jobs to your local Job Search Pal API. Set the API
      base URL here. The default works if you're running the docker
      compose stack on this machine.
    </p>
    <label for="apiBase">API base</label>
    <input id="apiBase" placeholder="http://localhost:8000" />
    <button id="save">Save</button>
    <div id="status"></div>
    <script src="options.js"></script>
  </body>
</html>
